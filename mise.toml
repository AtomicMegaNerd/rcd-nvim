[tools]
lua-language-server = "latest"
stylua = "latest"
oxfmt = "latest"
markdownlint-cli2 = "latest"
pre-commit = "latest"

# For JSON
"npm:vscode-langservers-extracted" = "latest"

[tasks.setup]
description = "Generate .pre-commit-config.yaml and install git hooks"
run = """
cat > .pre-commit-config.yaml << 'EOF'
repos:
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt
        language: system
        entry: oxfmt
        args: ["."]
        pass_filenames: false

      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: markdownlint-cli2
        types: [markdown]

      - id: stylua
        name: stylua
        language: system
        entry: stylua
        args: ["--check", "."]
        pass_filenames: false
        types: [lua]

      - id: lua-language-server
        name: lua-language-server
        language: system
        entry: lua-language-server
        args: ["--check", "."]
        pass_filenames: false
        types: [lua]

EOF
pre-commit install
"""
