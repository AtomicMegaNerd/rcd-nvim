[tools]
lua-language-server = "latest"
stylua = "latest"
markdownlint-cli2 = "latest"
pre-commit = "latest"
biome = "latest"
oxfmt = "latest"

[tools.rust]
version = "stable"
components = ["clippy", "rustfmt"]

[tasks.setup]
description = "Generate .pre-commit-config.yaml and install git hooks"
run = """
cat > .pre-commit-config.yaml << 'EOF'
repos:
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: markdownlint-cli2
        types: [markdown]

      - id: oxfmt
        name: oxfmt
        language: system
        entry: oxfmt
        args: ["--write"]
        pass_filenames: false
        types: [markdown]

      - id: biome
        name: biome
        language: system
        entry: biome
        args: ["check", "--write"]
        pass_filenames: false
        types: [json]

      - id: stylua
        name: stylua
        language: system
        entry: stylua
        args: ["--check", "."]
        pass_filenames: false
        types: [lua]

      - id: lua-language-server
        name: lua-language-server
        language: system
        entry: lua-language-server
        args: ["--check", "--configpath", "./.luarc.jsonc", "."]
        pass_filenames: false
        types: [lua]

EOF
pre-commit install
"""
